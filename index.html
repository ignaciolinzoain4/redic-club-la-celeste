<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a6fa8">
  <meta property="og:title" content="Club La Celeste - Descargá la app">
  <meta property="og:description" content="Descargá la app de Club La Celeste Panadería">
  <title>Club La Celeste - Descargá la app</title>
  <script>
    // Redirigir ANTES de renderizar cualquier contenido visual
    (function() {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.replace("https://apps.apple.com/ar/app/club-la-celeste-panaderia/id1482179582");
      } else if (/android/i.test(ua)) {
        window.location.replace("https://play.google.com/store/apps/details?id=com.cucinago.club&pcampaignid=web_share");
      }
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(180deg, #1a6fa8 0%, #0d4a7a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      padding: 5vh 24px;
      gap: 0;
    }

    .logo-top {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-top img {
      width: min(45vw, 180px);
      height: auto;
      mix-blend-mode: screen;
      filter: brightness(1.1);
    }

    .middle {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(16px, 3vh, 28px);
      width: 100%;
    }

    h1 {
      color: #ffffff;
      font-size: clamp(20px, 5vw, 28px);
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.01em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }

    .badges {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(12px, 2.5vh, 20px);
      width: 100%;
    }

    .badge-link {
      display: block;
      transition: transform 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .badge-link:active {
      transform: scale(0.96);
      opacity: 0.85;
    }

    .badge-link svg {
      display: block;
      width: min(72vw, 220px);
      height: auto;
    }

    .logo-bottom {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-bottom img {
      width: min(55vw, 200px);
      height: auto;
      mix-blend-mode: screen;
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Logo superior circular -->
    <div class="logo-top">
      <img src="club_la_celeste.png" alt="Club La Celeste">
    </div>

    <!-- Centro: título y botones -->
    <div class="middle">
      <h1>¡Descargá la app!</h1>

      <div class="badges">

        <!-- Badge App Store -->
        <a class="badge-link"
           href="https://apps.apple.com/ar/app/club-la-celeste-panaderia/id1482179582"
           rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 65" role="img" aria-label="Descárgalo en el App Store">
            <rect width="220" height="65" rx="10" fill="#000"/>
            <rect width="220" height="65" rx="10" fill="none" stroke="#A6A6A6" stroke-width="1"/>
            <!-- Apple logo -->
            <path d="M38.5 12.8c2.1-2.6 3.5-6.2 3.1-9.8-3 .1-6.6 2-8.7 4.6-1.9 2.2-3.6 5.8-3.1 9.2 3.3.3 6.6-1.4 8.7-4z" fill="#fff"/>
            <path d="M41.6 17.8c-4.8-.3-8.9 2.7-11.2 2.7-2.3 0-5.8-2.6-9.6-2.5-4.9.1-9.5 2.9-12 7.3-5.1 8.9-1.3 22 3.6 29.2 2.4 3.6 5.3 7.5 9.1 7.3 3.6-.1 5-2.3 9.3-2.3 4.4 0 5.6 2.3 9.4 2.2 3.9-.1 6.4-3.5 8.8-7.1 2.8-4 3.9-7.9 4-8.1-.1-.1-7.7-3-7.8-11.8-.1-7.4 6-10.9 6.3-11.1-3.5-5.1-8.8-5.6-9.9-5.8z" fill="#fff"/>
            <!-- Download on the -->
            <text x="62" y="26" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="11" fill="#fff" letter-spacing="0.3">Descárgalo en el</text>
            <!-- App Store -->
            <text x="62" y="46" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="20" font-weight="600" fill="#fff" letter-spacing="-0.3">App Store</text>
          </svg>
        </a>

        <!-- Badge Google Play -->
        <a class="badge-link"
           href="https://play.google.com/store/apps/details?id=com.cucinago.club&pcampaignid=web_share"
           rel="noopener noreferrer">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 65" role="img" aria-label="Disponible en Google Play">
            <rect width="220" height="65" rx="10" fill="#000"/>
            <rect width="220" height="65" rx="10" fill="none" stroke="#A6A6A6" stroke-width="1"/>
            <!-- Google Play triangle icon (multicolor) -->
            <!-- Red triangle top-right -->
            <path d="M20 14l20 18.5L20 51z" fill="#EA4335"/>
            <!-- Blue triangle bottom-left -->
            <path d="M20 51l4-4.8 16 3.5-20 1.3z" fill="#4285F4" opacity="0"/>
            <!-- Simplified colorful play icon -->
            <path d="M17 13.5l22.5 19-22.5 19V13.5z" fill="#fff" opacity="0.1"/>
            <!-- Green bottom -->
            <path d="M17 32.5l22.5 19-3.5-2-19-17z" fill="#34A853" opacity="0"/>
            <!-- Actual Google Play icon approximation -->
            <g transform="translate(16, 13)">
              <!-- Shadow gradient base -->
              <path d="M1 1.8L20.5 19 1 36.2V1.8z" fill="url(#gpGrad1)"/>
              <path d="M1 1.8l19.5 17.2L30 13.5 4.5 0 1 1.8z" fill="#61DAFB" opacity="0"/>
              <!-- Multicolor play button -->
              <path d="M0 2L0 36L20 19L0 2z" fill="#00D2FF" opacity="0"/>
              <!-- Real colored paths -->
              <path d="M.5 1.2C.2 1.4 0 1.9 0 2.5v33c0 .6.2 1.1.5 1.3l.1.1L19 19.1v-.4L.6 1.1z" fill="#4FAFE5"/>
              <path d="M25.2 25.2l-6.2-6.2v-.4l6.2-6.2.1.1 7.3 4.2c2.1 1.2 2.1 3.1 0 4.2l-7.4 4.3z" fill="#FFCA28"/>
              <path d="M25.3 25.1L19 18.9 .5 36.8c.7.7 1.8.8 3 .1l21.8-11.8z" fill="#5CB85C"/>
              <path d="M25.3 12.7L3.5 .9C2.3.2 1.2.3.5 1l18.6 17.9 6.2-6.2z" fill="#F44336"/>
            </g>
            <!-- Get it on -->
            <text x="62" y="26" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="11" fill="#fff" letter-spacing="0.3">Disponible en</text>
            <!-- Google Play -->
            <text x="62" y="46" font-family="-apple-system,Helvetica,Arial,sans-serif" font-size="20" font-weight="600" fill="#fff" letter-spacing="-0.3">Google Play</text>
          </svg>
        </a>

      </div>
    </div>

    <!-- Logo inferior panadería -->
    <div class="logo-bottom">
      <img src="La_celeste_logo_completo.png" alt="La Celeste Panadería 1952">
    </div>

  </div>
</body>
</html>
